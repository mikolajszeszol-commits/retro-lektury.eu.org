<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Retro Lektury - Cyfrowa biblioteka klasyki literatury polskiej i światowej. Czytaj dzieła na każdym urządzeniu w retro stylu.">
    <meta name="keywords" content="retro lektury, książki, literatura, ebook, epub, klasyka, polska literatura, audiobook, biblioteka">
    <meta name="author" content="Retro Lektury">
    <title>Retro Lektury - Cyfrowa Biblioteka Klasyki</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body class="light-theme">

    <div class="container">
        <header class="app-header">
            <h1>Retro Lektury</h1>
            <p class="subtitle">Twoja cyfrowa biblioteka klasyki</p>
            <button id="theme-toggle" class="btn-theme">🌙 Tryb Nocny</button>
        </header>

        <main>
            <section id="library-home">
                <h2 class="section-title">Twoje Książki:</h2>
                <div id="book-list" class="book-grid"></div>
            </section>
            
            <section id="reader-view" class="hidden">
                <div class="reader-header">
                    <button onclick="closeReader()" class="btn-back">⬅ Wróć</button>
                    <div class="reader-info">
                        <h2 id="current-reading-title">Tytuł</h2>
                        <p id="page-counter">Wczytywanie...</p>
                    </div>
                </div>
                
                <div id="output-content" class="reader-content"></div>
                <div id="epub-viewer" class="hidden"></div>

                <div id="reader-nav" class="reader-nav hidden">
                    <button id="prev-page" class="btn-nav">⬅ Poprzednia</button>
                    <button id="next-page" class="btn-nav">Następna ➡</button>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Projekt <strong>Retro Lektury</strong> autorstwa <strong>Mikołaj Szęszoł</strong> • Książki pochodzą z serwisu <a href="https://wolnelektury.pl" target="_blank">Wolne Lektury</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
